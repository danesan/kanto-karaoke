services:
  postgres:
    image: postgres:16
    container_name: kanto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanto
      POSTGRES_PASSWORD: kanto
      POSTGRES_DB: kanto
    ports:
      - "5432:5432"
    volumes:
      - kanto_postgres_data:/var/lib/postgresql/data

volumes:
  kanto_postgres_data: